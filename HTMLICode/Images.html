<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Image</title>
</head>

<body>

	<p>The School mascot is Testudo.
		<img src="testudo.jpg" title="Testudo (Mascot) Image" alt="Testudo's image'">
	</p>
	<hr>

	<p>The School mascot is Testudo (with width and height in pixels)
		<img src="testudo.jpg" width="44" height="80" alt="Testudo's image'">
	</p>
	<hr>

	<p>The School mascot is Testudo (only with width)
		<img src="testudo.jpg" width="200" alt="Testudo's image'">
	</p>
	<hr>

	<p>The School mascot is Testudo (only with height)
		<img src="testudo.jpg" height="200" alt="Testudo's image'">
	</p>
	<hr>

	<p>&lt;img&gt; is an inline element
		<!-- Images placed next to each other (notice title attribute)-->
		<img src="testudo.jpg" alt="Testudo's image'">
		<img src="galaxy.jpeg" width="100" height="200" alt="galaxy">
		<img src="testudo.jpg" alt="Testudo's image'">
		<img src="testudo.jpg" alt="Testudo's image'">
		<img src="testudo.jpg" alt="Testudo's image'">
	</p>
	<hr>

	<p>Accessing an online image (not local image)
	<!-- Notice width was specified without " "-->
	<img src = "https://www.cs.umd.edu/sites/default/files/cs_logo.png" width=200 alt="CS Logo">
	</p>
	<hr>
</body>

</html>
